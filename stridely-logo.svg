<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="96" fill="#1a1e28"/>

  <!-- Chevron 1 — más lejano, más tenue -->
  <path d="M44 128 L100 60 L156 128"
        stroke="#F5611A" stroke-opacity="0.25" stroke-width="7"
        stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Chevron 2 — medio -->
  <path d="M44 108 L100 40 L156 108"
        stroke="#F5611A" stroke-opacity="0.55" stroke-width="7.5"
        stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Chevron 3 — primero plano, máxima intensidad -->
  <path d="M44 88 L100 20 L156 88"
        stroke="#F5611A" stroke-opacity="1" stroke-width="9"
        stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
