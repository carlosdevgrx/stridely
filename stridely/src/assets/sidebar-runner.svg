<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 148" fill="none">
  <!-- Ground shadow -->
  <ellipse cx="104" cy="141" rx="50" ry="6" fill="rgba(124,58,237,0.18)"/>

  <!-- Motion lines -->
  <line x1="8"  y1="60" x2="46" y2="60" stroke="#8B5CF6" stroke-width="3"   stroke-linecap="round" opacity="0.45"/>
  <line x1="13" y1="74" x2="42" y2="74" stroke="#8B5CF6" stroke-width="2.5" stroke-linecap="round" opacity="0.30"/>
  <line x1="6"  y1="88" x2="36" y2="88" stroke="#8B5CF6" stroke-width="2"   stroke-linecap="round" opacity="0.20"/>

  <!-- === TRAILING LEG (left, pushed back) === -->
