  <!-- === SPARKLES === -->
  <circle cx="166" cy="23" r="3.5" fill="rgba(139,92,246,0.60)"/>
  <circle cx="174" cy="37" r="2.2" fill="rgba(139,92,246,0.40)"/>
  <circle cx="161" cy="41" r="1.8" fill="rgba(139,92,246,0.50)"/>
  <circle cx="179" cy="49" r="1.5" fill="rgba(139,92,246,0.32)"/>
  <circle cx="169" cy="57" r="1.2" fill="rgba(139,92,246,0.28)"/>
