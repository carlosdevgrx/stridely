  <!-- === SHORTS === -->
  <path d="M93 82 Q95 99 106 99 Q119 99 119 84 Q116 74 104 73 Q93 75 93 82 Z" fill="#7C3AED"/>
  <line x1="106" y1="74" x2="106" y2="98" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>

  <!-- === TORSO / SHIRT === -->
  <path d="M97 48 Q88 66 93 82 Q97 88 106 87 Q119 87 119 82 Q121 66 115 48 Q110 43 104 43 Z" fill="white"/>
  <path d="M100 47 Q105 53 113 47" stroke="rgba(0,0,0,0.09)" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M100 61 Q106 58 113 61 Q111 68 106 69 Q102 68 100 61 Z" fill="rgba(124,58,237,0.12)"/>

  <!-- === BACK ARM (right) === -->
  <line x1="117" y1="56" x2="132" y2="70" stroke="#F5C4A0" stroke-width="11" stroke-linecap="round"/>
  <line x1="132" y1="70" x2="139" y2="85" stroke="#F5C4A0" stroke-width="10" stroke-linecap="round"/>
  <circle cx="140" cy="89" r="7" fill="#F5C4A0"/>

