  <!-- === LEADING LEG (right, knee driving forward) === -->
  <line x1="112" y1="86" x2="138" y2="75"  stroke="#F5C4A0" stroke-width="13" stroke-linecap="round"/>
  <line x1="138" y1="75" x2="144" y2="107" stroke="#F5C4A0" stroke-width="11" stroke-linecap="round"/>
  <!-- Right shoe body -->
  <path d="M133 109 Q145 102 157 108 Q159 118 148 121 Q135 119 133 115 Z" fill="white"/>
  <path d="M133 109 Q145 102 157 108" stroke="#7C3AED" stroke-width="2.5" stroke-linecap="round"/>
