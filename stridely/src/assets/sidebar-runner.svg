  <line x1="96" y1="56" x2="82" y2="46" stroke="#F5C4A0" stroke-width="11" stroke-linecap="round"/>
  <line x1="82" y1="46" x2="74" y2="32" stroke="#F5C4A0" stroke-width="10" stroke-linecap="round"/>
  <circle cx="72" cy="28" r="7" fill="#F5C4A0"/>

  <!-- === NECK === -->
  <line x1="106" y1="41" x2="107" y2="49" stroke="#F5C4A0" stroke-width="10" stroke-linecap="round"/>

  <!-- === HEAD === -->
  <circle cx="108" cy="25" r="18" fill="#F5C4A0"/>

  <!-- === EAR === -->
  <ellipse cx="91" cy="26" rx="5" ry="6" fill="#EBB592"/>
  <ellipse cx="91" cy="26" rx="2.5" ry="3.5" fill="#DCA07C"/>

  <!-- === HAIR === -->
  <path d="M91 18 C92 5 109 3 119 7 C125 10 128 17 126 23 C122 12 108 10 93 16 Z" fill="#2C1E1E"/>
  <path d="M91 18 C89 22 90 30 92 29 C90 25 89 21 91 18 Z" fill="#2C1E1E"/>

  <!-- === EYE === -->
  <circle cx="114" cy="24" r="2.8" fill="#2C1E1E"/>
  <circle cx="115.2" cy="22.8" r="1" fill="white"/>
  <path d="M110 19 Q114 17 118 19" stroke="#2C1E1E" stroke-width="1.5" stroke-linecap="round"/>

  <!-- === SMILE === -->
