<?xml version="1.0" encoding="UTF-8"?>
<!--
  Stridely — Mobile background
  Passion Finder palette:  cool blue-gray top  →  warm amber centre  →  sandy tan bottom
  8 additive radial/linear layers, all blended through normal opacity stacking.
  preserveAspectRatio="xMidYMid slice" fills any viewport without distortion.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 390 844"
     preserveAspectRatio="xMidYMid slice"
     width="390" height="844">
  <defs>

    <!--
    ══════════════════════════════════════════════════════════════════
    LAYER 1 — Base gradient
    Cool blue-gray at top (#7e8fa0) → muted warm amber in the mid
    (#b8845c) → soft sandy tan at bottom (#c8aa80).
    This sets the overall temperature transition.
    ══════════════════════════════════════════════════════════════════
    -->
    <linearGradient id="base" x1="195" y1="0" x2="195" y2="844" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#6e8092"/>
      <stop offset="32%"  stop-color="#8c7c78"/>
      <stop offset="58%"  stop-color="#b08060"/>
      <stop offset="80%"  stop-color="#c4a070"/>
      <stop offset="100%" stop-color="#cbaa80"/>
    </linearGradient>

    <!--
    LAYER 2 — Dominant warm-orange blob (centre-left, ~40% down)
    This is the "hot sun" you see in the reference — large, soft, punchy.
    -->
    <radialGradient id="g-sun" cx="130" cy="380" r="260" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#d4823c" stop-opacity="0.88"/>
      <stop offset="40%"  stop-color="#c87838" stop-opacity="0.50"/>
      <stop offset="75%"  stop-color="#c07030" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#c07030" stop-opacity="0"/>
    </radialGradient>

    <!--
    LAYER 3 — Secondary warm blob (right side, slightly lower)
    Gives asymmetric warmth that prevents the right edge from going flat.
    -->
    <radialGradient id="g-right" cx="320" cy="460" r="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#b87c48" stop-opacity="0.50"/>
      <stop offset="60%"  stop-color="#b87848" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#b87848" stop-opacity="0"/>
    </radialGradient>

    <!--
    LAYER 4 — Cool blue-gray overlay on the top half
    This is the "blue" note the user spotted. It desaturates and cools
    the top third, creating contrast against the warm centre.
    -->
    <radialGradient id="g-cool-top" cx="195" cy="-40" r="340" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#8098b0" stop-opacity="0.68"/>
      <stop offset="55%"  stop-color="#7090a8" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#7090a8" stop-opacity="0"/>
    </radialGradient>

    <!--
    LAYER 5 — Cool left-edge accent
    Adds the slight blue vignette visible on the left side of the reference.
    -->
    <radialGradient id="g-cool-left" cx="-20" cy="200" r="260" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#788898" stop-opacity="0.55"/>
      <stop offset="60%"  stop-color="#788898" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#788898" stop-opacity="0"/>
    </radialGradient>

    <!--
    LAYER 6 — Bottom sandy warmth glow
    Lifts the bottom to a brighter, slightly golden tone.
    -->
    <radialGradient id="g-bottom" cx="195" cy="900" r="320" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#d8bc90" stop-opacity="0.70"/>
      <stop offset="55%"  stop-color="#d0b480" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#d0b480" stop-opacity="0"/>
    </radialGradient>

    <!--
    LAYER 7 — Subtle top-edge darkening stripe
    A narrow shadow across the very top gives visual weight / framing.
    -->
    <linearGradient id="g-top-shadow" x1="0" y1="0" x2="0" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#3a4a58" stop-opacity="0.38"/>
      <stop offset="100%" stop-color="#3a4a58" stop-opacity="0"/>
    </linearGradient>

    <!--
    LAYER 8 — Bottom-edge subtle shadow
    Grounds the composition and helps the glass nav feel anchored.
    -->
    <linearGradient id="g-bot-shadow" x1="0" y1="720" x2="0" y2="844" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#5a4030" stop-opacity="0"/>
      <stop offset="100%" stop-color="#5a4030" stop-opacity="0.30"/>
    </linearGradient>

  </defs>

  <!-- ── Render stack (bottom → top) ── -->
  <rect width="390" height="844" fill="url(#base)"/>
  <rect width="390" height="844" fill="url(#g-sun)"/>
  <rect width="390" height="844" fill="url(#g-right)"/>
  <rect width="390" height="844" fill="url(#g-cool-top)"/>
  <rect width="390" height="844" fill="url(#g-cool-left)"/>
  <rect width="390" height="844" fill="url(#g-bottom)"/>
  <rect width="390" height="844" fill="url(#g-top-shadow)"/>
  <rect width="390" height="844" fill="url(#g-bot-shadow)"/>

</svg>
