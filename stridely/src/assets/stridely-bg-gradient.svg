<svg width="390" height="844" viewBox="0 0 390 844" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>

    <!-- BASE: naranja cálido central -->
    <radialGradient id="center" cx="50%" cy="62%" r="55%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#E8752A"/>
      <stop offset="35%"  stop-color="#D4621A"/>
      <stop offset="70%"  stop-color="#B8471A"/>
      <stop offset="100%" stop-color="#8B2E0D" stop-opacity="0"/>
    </radialGradient>

    <!-- TOP LEFT: azul grisáceo frío -->
    <radialGradient id="topLeft" cx="10%" cy="8%" r="60%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#A8B8C8" stop-opacity="0.9"/>
      <stop offset="40%"  stop-color="#8A9FB5" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#6B8BA4" stop-opacity="0"/>
    </radialGradient>

    <!-- TOP RIGHT: azul más suave -->
    <radialGradient id="topRight" cx="90%" cy="5%" r="55%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#B4C4D4" stop-opacity="0.85"/>
      <stop offset="50%"  stop-color="#96AABE" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#7890A8" stop-opacity="0"/>
    </radialGradient>

    <!-- MID LEFT: naranja cálido -->
    <radialGradient id="midLeft" cx="0%" cy="45%" r="50%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#D4762A" stop-opacity="0.8"/>
      <stop offset="60%"  stop-color="#C26020" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#A84A10" stop-opacity="0"/>
    </radialGradient>

    <!-- MID RIGHT: ocre cálido -->
    <radialGradient id="midRight" cx="100%" cy="40%" r="50%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#C87830" stop-opacity="0.75"/>
      <stop offset="55%"  stop-color="#B46220" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#9A4C10" stop-opacity="0"/>
    </radialGradient>

    <!-- BOTTOM: marrón oscuro cálido -->
    <radialGradient id="bottom" cx="50%" cy="100%" r="60%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#7A3010"/>
      <stop offset="40%"  stop-color="#8A3A14"/>
      <stop offset="100%" stop-color="#6A2808" stop-opacity="0"/>
    </radialGradient>

    <!-- BOTTOM LEFT: tono tierra -->
    <radialGradient id="bottomLeft" cx="5%" cy="90%" r="50%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#6E3A18" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#5A2A10" stop-opacity="0"/>
    </radialGradient>

    <!-- BOTTOM RIGHT -->
    <radialGradient id="bottomRight" cx="95%" cy="92%" r="45%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#7A3818" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#5E2A0C" stop-opacity="0"/>
    </radialGradient>

    <!-- TOP CENTER suavizado azul-gris -->
    <radialGradient id="topCenter" cx="50%" cy="0%" r="45%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#C0CCD8" stop-opacity="0.75"/>
      <stop offset="50%"  stop-color="#A8B8C6" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#8CA0B0" stop-opacity="0"/>
    </radialGradient>

    <!-- NOISE texture para suavizar -->
    <filter id="noise" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" result="noiseOut"/>
      <feColorMatrix type="saturate" values="0" in="noiseOut" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="soft-light" result="blended"/>
      <feComposite in="blended" in2="SourceGraphic" operator="in"/>
    </filter>

  </defs>

  <!-- BASE RECT — marrón cálido oscuro como fondo base -->
  <rect width="390" height="844" fill="#7A3210"/>

  <!-- NARANJA CENTRAL — el corazón del gradiente -->
  <rect width="390" height="844" fill="url(#center)"/>

  <!-- CAPAS DE COLOR encima -->
  <rect width="390" height="844" fill="url(#topLeft)"/>
  <rect width="390" height="844" fill="url(#topRight)"/>
  <rect width="390" height="844" fill="url(#topCenter)"/>
  <rect width="390" height="844" fill="url(#midLeft)"/>
  <rect width="390" height="844" fill="url(#midRight)"/>
  <rect width="390" height="844" fill="url(#bottom)"/>
  <rect width="390" height="844" fill="url(#bottomLeft)"/>
  <rect width="390" height="844" fill="url(#bottomRight)"/>

  <!-- NOISE sobre todo para textura orgánica -->
  <rect width="390" height="844" fill="rgba(0,0,0,0)" filter="url(#noise)" opacity="0.08"/>

</svg>
